/* 
    Write your CSS here 
    Gap Colour: #000
    White: #F0F1EC
    Red: #E72F24
    Black: #232629
    Blue: #004592
    Yellow: #F9D01E

    For dimensions, see dimensions.png image.
    HINT: Remember you can't change the properties of grid lines.
    But grid lines are transparent!
    */
    body{
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      padding: 0;
    }
    .container{
      height: 748px;
      width: 748px;
      display: grid;
      background-color: #000;
      gap: 9px;
      grid-template-columns: 320px 198px 153px 50px;
      grid-template-rows: 414px 130px 150px 20px;
    }

    .red{
      background-color: #E72F24;
    }
    .white1, .white2, .white3, .white4, .white5{
      background-color: #F0F1EC;
    }
    .white1{
      grid-column: span 3;
    }
    .white2{
      grid-row: 2/4;
    }
    .white3{
      grid-column: span 2;
      grid-row: 2/4;
    }
    .blue{
      grid-row: -4/-3;
      background-color: #004592;
      border-bottom: 10px #000 solid;
      
    }
    .white4{
      grid-row:-3/-1;
    }
    .yellow{
      grid-column: -4/-3;
      background-color:#F9D01E;
    }
    .black{
      grid-column: -3/-2;
      background-color:#232629;
    }
  </style>

      <div class="black"></div>
     
    </div>
